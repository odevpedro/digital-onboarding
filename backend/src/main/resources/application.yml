server:
  port: 8080

spring:
  application:
    name: digital-onboarding
  datasource:
    url: jdbc:postgresql://localhost:5432/onboarding
    username: onboarding
    password: onboarding
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    time-zone: America/Sao_Paulo
  rabbitmq:
    host: localhost
    port: 5672
    username: onboarding
    password: onboarding
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info, metrics
  metrics:
    tags:
      application: digital-onboarding
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    com.empresa.onboarding: DEBUG

foundation:
  web:
    correlation-enabled: true
    jackson-time-zone: America/Sao_Paulo
    cors-allowed-origins:
      - "*"
    cors-allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
  security:
    enabled: true
    public-paths:
      - "/**"
  audit:
    enabled: false
  observability:
    mdc-enabled: true
    metrics-enabled: true
    application-name: digital-onboarding
  idempotency:
    enabled: true
    ttl-hours: 24
  outbox:
    enabled: true
    poll-interval-ms: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

onboarding:
  simuladores:
    receita-federal:
      url: http://localhost:9991
    serpro-document:
      url: http://localhost:9992
    biometria-facial:
      url: http://localhost:9993
    lista-restritiva:
      url: http://localhost:9994
    pep-gafi:
      url: http://localhost:9995
    bureau-credito:
      url: http://localhost:9996
    core-bancario:
      url: http://localhost:9997
    dict-pix:
      url: http://localhost:9998
  nucleo-validacao:
    url: http://localhost:8081
  bacen-regulatorio:
    enabled: true
  storage:
    minio:
      url: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket-documentos: onboarding-documentos
